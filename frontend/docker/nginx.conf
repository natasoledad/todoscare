# TODOSCARE — SPA (PWA) servida por nginx, con la API bajo /api hacia el backend.
# El prefijo /api evita que las rutas del SPA (/medico, /admin, /aseguradora…)
# colisionen con las de la API al recargar o compartir un enlace profundo.

upstream todoscare_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Límite de subida (exámenes/documentos).
    client_max_body_size 20m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # ── API: /api/* → backend, quitando el prefijo /api ──
    location /api/ {
        proxy_pass http://todoscare_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Archivos subidos (servidos por el backend en /files) ──
    location /files/ {
        proxy_pass http://todoscare_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Assets con hash: cache larga e inmutable ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # El service worker no debe cachearse de forma agresiva.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ── Fallback del SPA: cualquier otra ruta la resuelve React Router ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
