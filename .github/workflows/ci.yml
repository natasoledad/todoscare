name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: todoscare
          POSTGRES_PASSWORD: todoscare
          POSTGRES_DB: todoscare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todoscare"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://todoscare:todoscare@localhost:5432/todoscare
      JWT_SECRET: ci-test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -e ".[dev]"
      - name: Pruebas de humo (8 suites, BD limpia por suite)
        run: |
          set -e
          for suite in rbac paciente medico empresa admin crm aseguradora integraciones; do
            echo "── $suite ──"
            # Cada suite asume el estado del seed; reseteamos el esquema entre suites.
            alembic downgrade base
            alembic upgrade head
            python -m app.seed
            python -m tests.test_${suite}_smoke
          done

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
